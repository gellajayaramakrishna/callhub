<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallHub — Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="login-page">
  <div class="glass login-card">
    <div class="login-logo">📞</div>
    <h1>CallHub</h1>
    <p class="tagline">Campus Phone Directory · IIT Gandhinagar</p>

    <div class="error-box" id="error-box"></div>

    <div class="input-group">
      <label>Institute Email</label>
      <input type="email" id="email" placeholder="yourname@org.in" />
    </div>

    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your phone number" />
    </div>

    <button class="btn-primary" onclick="doLogin()">Sign In</button>

    <p style="margin-top:20px; font-size:12px; color:var(--text-muted);">
      For support: helpdesk@iitgn.ac.in
    </p>
  </div>
</div>

<script>
if (localStorage.getItem("session_token")) window.location.href = "/dashboard";

async function doLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const err = document.getElementById("error-box");

  if (!email || !password) {
    err.style.display = "block";
    err.innerText = "Please enter your email and password.";
    return;
  }

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("session_token", data.session_token);
    localStorage.setItem("member_id", data.member_id);
    localStorage.setItem("member_name", data.name);
    localStorage.setItem("role", data.role);
    localStorage.setItem("login_id", data.login_id);
    window.location.href = "/dashboard";
  } else {
    err.style.display = "block";
    err.innerText = data.error || "Login failed.";
  }
}

document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
